<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招链通指挥台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .time {
            font-size: 0.9em;
            margin-top: 10px;
            opacity: 0.8;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card-icon {
            font-size: 2.5em;
            margin-bottom: 15px;
        }
        
        .card-title {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .card-value {
            color: #333;
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .card-change {
            margin-top: 10px;
            font-size: 0.85em;
        }
        
        .card-change.up {
            color: #10b981;
        }
        
        .card-change.down {
            color: #ef4444;
        }
        
        .section {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,
        .data-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }
        
        .data-table tr:hover {
            background: #f8f9fa;
        }
        
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }
        
        .status.active {
            background: #d1fae5;
            color: #059669;
        }
        
        .status.pending {
            background: #fef3c7;
            color: #d97706;
        }
        
        .status.inactive {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 20px;
            background: #f8f9fa;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }
        
        .action-btn:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .action-icon {
            font-size: 1.5em;
        }
        
        .action-text {
            font-size: 0.95em;
            color: #333;
        }
        
        .action-desc {
            font-size: 0.8em;
            color: #888;
        }
        
        footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            padding: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦞 招链通指挥台</h1>
            <p>产业招商全流程数据中心</p>
            <div class="time" id="currentTime">加载中...</div>
        </div>
        
        <div style="text-align: center; margin-bottom: 30px;">
            <button class="refresh-btn" onclick="loadAllData()">
                🔄 刷新数据
            </button>
        </div>
        
        <div class="grid">
            <div class="card">
                <div class="card-icon">👥</div>
                <div class="card-title">客户线索</div>
                <div class="card-value" id="customerCount">-</div>
                <div class="card-change up" id="customerChange">📈 本月新增</div>
            </div>
            
            <div class="card">
                <div class="card-icon">📋</div>
                <div class="card-title">工商注册</div>
                <div class="card-value" id="regCount">-</div>
                <div class="card-change up" id="regChange">📈 进行中</div>
            </div>
            
            <div class="card">
                <div class="card-icon">🏢</div>
                <div class="card-title">房源库存</div>
                <div class="card-value" id="propertyCount">-</div>
                <div class="card-change" id="propertyChange">📊 可租售</div>
            </div>
            
            <div class="card">
                <div class="card-icon">💰</div>
                <div class="card-title">合同金额</div>
                <div class="card-value" id="contractAmount">-</div>
                <div class="card-change up" id="contractChange">📈 本季度</div>
            </div>
            
            <div class="card">
                <div class="card-icon">📅</div>
                <div class="card-title">本月活动</div>
                <div class="card-value" id="eventCount">-</div>
                <div class="card-change" id="eventChange">📅 待执行</div>
            </div>
            
            <div class="card">
                <div class="card-icon">📰</div>
                <div class="card-title">政策库</div>
                <div class="card-value" id="policyCount">-</div>
                <div class="card-change up" id="policyChange">✨ 可申报</div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">🚀 快捷操作</h2>
            <div class="quick-actions">
                <button class="action-btn" onclick="openFeishu('customers')">
                    <span class="action-icon">➕</span>
                    <div>
                        <div class="action-text">新增客户线索</div>
                        <div class="action-desc">录入新客户信息</div>
                    </div>
                </button>
                
                <button class="action-btn" onclick="openFeishu('properties')">
                    <span class="action-icon">🏠</span>
                    <div>
                        <div class="action-text">管理房源</div>
                        <div class="action-desc">查看/编辑房源</div>
                    </div>
                </button>
                
                <button class="action-btn" onclick="openFeishu('calendar')">
                    <span class="action-icon">📆</span>
                    <div>
                        <div class="action-text">查看日程</div>
                        <div class="action-desc">招商日历</div>
                    </div>
                </button>
                
                <button class="action-btn" onclick="openFeishu('contracts')">
                    <span class="action-icon">📝</span>
                    <div>
                        <div class="action-text">合同管理</div>
                        <div class="action-desc">查看合同台账</div>
                    </div>
                </button>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">📋 最新客户线索</h2>
            <div id="recentCustomers">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>客户名称</th>
                            <th>需求类型</th>
                            <th>来源渠道</th>
                            <th>跟进状态</th>
                            <th>跟进人员</th>
                            <th>最近联系</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody">
                        <tr>
                            <td colspan="6" class="loading">
                                <div class="spinner"></div>
                                <div>加载中...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">📈 招商日历 - 近期活动</h2>
            <div id="upcomingEvents">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>活动名称</th>
                            <th>日期</th>
                            <th>时间</th>
                            <th>类型</th>
                            <th>地点</th>
                            <th>接待人员</th>
                        </tr>
                    </thead>
                    <tbody id="eventTableBody">
                        <tr>
                            <td colspan="6" class="loading">
                                <div class="spinner"></div>
                                <div>加载中...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <footer>
            <p>招链通指挥台 · 数据更新时间：<span id="updateTime">-</span></p>
            <p>Powered by QClaw 🦞</p>
        </footer>
    </div>
    
    <script>
        // 更新时间
        function updateTime() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN', options);
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        // 飞书 Bitable 应用 Token 配置
        const BITABLE_TOKENS = {
            customers: 'JxB8boQ9la945QsUh7ecpDyWnPe',    // 客户线索池
            properties: 'NvqibXUrfaN7bTsC9YFcVTGAnab',  // 房源台账
            calendar: 'BsDJbI91gaoGIpsSs5tc6aHxnae',    // 招商日历
            policies: 'JqcnbUiv6aGVUEsrsmFc3k53nVc',     // 政策库
            contracts: 'Fg6dbrv85axDVvsz713c80PRnoh'     // 合同台账
        };
        
        // 飞书 API 基础 URL
        const FEISHU_API = 'https://open.feishu.cn/open-apis';
        
        // 加载所有数据
        async function loadAllData() {
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('zh-CN');
            
            // 由于 Vercel 无法直接调用飞书 API，这里显示示例数据
            // 实际使用时需要通过后端代理或飞书小程序
            showDemoData();
        }
        
        // 显示示例数据（实际部署时替换为真实 API 调用）
        function showDemoData() {
            // 客户线索
            document.getElementById('customerCount').textContent = '12';
            document.getElementById('customerChange').textContent = '📈 本月新增 3 条';
            
            // 工商注册
            document.getElementById('regCount').textContent = '8';
            document.getElementById('regChange').textContent = '📈 进行中 5 个';
            
            // 房源库存
            document.getElementById('propertyCount').textContent = '45';
            document.getElementById('propertyChange').textContent = '📊 可租售 32 套';
            
            // 合同金额
            document.getElementById('contractAmount').textContent = '¥28.5万';
            document.getElementById('contractChange').textContent = '📈 本季度';
            
            // 活动数量
            document.getElementById('eventCount').textContent = '6';
            document.getElementById('eventChange').textContent = '📅 待执行 3 场';
            
            // 政策库
            document.getElementById('policyCount').textContent = '23';
            document.getElementById('policyChange').textContent = '✨ 可申报 8 项';
            
            // 最近客户线索
            const customers = [
                { name: '深圳市某某科技有限公司', type: '工商注册', source: '产业活动', status: '跟进中', person: '张三', date: '2026-03-24' },
                { name: '王五', type: '代理记账', source: '同行转介', status: '已签约', person: '李四', date: '2026-03-23' },
                { name: '广州某某贸易公司', type: '写字楼租赁', source: '官网咨询', status: '需求确认中', person: '王六', date: '2026-03-22' }
            ];
            
            let customerHtml = '';
            customers.forEach(c => {
                customerHtml += `
                    <tr>
                        <td>${c.name}</td>
                        <td>${c.type}</td>
                        <td>${c.source}</td>
                        <td><span class="status ${c.status === '已签约' ? 'active' : c.status === '跟进中' ? 'pending' : 'inactive'}">${c.status}</span></td>
                        <td>${c.person}</td>
                        <td>${c.date}</td>
                    </tr>
                `;
            });
            document.getElementById('customerTableBody').innerHTML = customerHtml;
            
            // 近期活动
            const events = [
                { name: '园区招商推介会', date: '2026-03-28', time: '14:00-16:00', type: '招商活动', location: '深圳南山', person: '张三' },
                { name: '客户拜访 - 某某科技', date: '2026-03-27', time: '10:00-11:00', type: '客户拜访', location: '客户公司', person: '李四' },
                { name: '政策宣讲会', date: '2026-03-30', time: '09:00-12:00', type: '会议活动', location: '会议室A', person: '王六' }
            ];
            
            let eventHtml = '';
            events.forEach(e => {
                eventHtml += `
                    <tr>
                        <td>${e.name}</td>
                        <td>${e.date}</td>
                        <td>${e.time}</td>
                        <td>${e.type}</td>
                        <td>${e.location}</td>
                        <td>${e.person}</td>
                    </tr>
                `;
            });
            document.getElementById('eventTableBody').innerHTML = eventHtml;
        }
        
        // 打开飞书相关页面
        function openFeishu(type) {
            const urls = {
                customers: 'https://dk2rhqh9t5.feishu.cn/base/JxB8boQ9la945QsUh7ecpDyWnPe',
                properties: 'https://dk2rhqh9t5.feishu.cn/base/NvqibXUrfaN7bTsC9YFcVTGAnab',
                calendar: 'https://dk2rhqh9t5.feishu.cn/base/BsDJbI91gaoGIpsSs5tc6aHxnae',
                contracts: 'https://dk2rhqh9t5.feishu.cn/base/Fg6dbrv85axDVvsz713c80PRnoh'
            };
            window.open(urls[type], '_blank');
        }
        
        // 页面加载时获取数据
        window.onload = loadAllData;
    </script>
</body>
</html>
